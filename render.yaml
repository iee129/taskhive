services:
  - type: web
    name: taskhive-backend
    runtime: docker
    dockerfilePath: ./auth/Dockerfile
    dockerContext: ./auth
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: SPRING_PROFILES_ACTIVE
        value: demo
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://taskhive.vercel.app
      - key: SENTRY_DSN
        sync: false
      - key: JAVA_OPTS
        value: "-XX:+UseSerialGC -Xss512k -XX:MaxRAMPercentage=75"
