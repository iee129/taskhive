sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:production}
  traces-sample-rate: 0.2
  exception-resolver-order: -2147483647

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate

server:
  servlet:
    session:
      cookie:
        same-site: none
        secure: true

taskhive:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://taskhive.vercel.app}
