spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/taskhive
    username: ${DB_USERNAME:taskhive}
    password: ${DB_PASSWORD:taskhive}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.taskhive: DEBUG
    org.springframework.security: DEBUG
