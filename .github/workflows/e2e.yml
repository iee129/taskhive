name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'auth/**'
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate target environment
        run: |
          if [ -z "$E2E_BACKEND_URL" ]; then
            echo "WARNING: E2E_BACKEND_URL is not set. Seed step will be skipped."
          fi
        env:
          E2E_BACKEND_URL: ${{ secrets.E2E_BACKEND_URL }}

      - name: Seed test data
        if: ${{ secrets.E2E_BACKEND_URL != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$E2E_BACKEND_URL/api/dev/seed")
          echo "Seed response: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "409" ]; then
            echo "WARNING: Seed returned $STATUS — tests may fail if test@example.com does not exist"
          fi
        env:
          E2E_BACKEND_URL: ${{ secrets.E2E_BACKEND_URL }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Playwright Chromium
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
