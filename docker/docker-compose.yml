version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskhive-db
    environment:
      POSTGRES_DB: taskhive
      POSTGRES_USER: taskhive
      POSTGRES_PASSWORD: taskhive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskhive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: taskhive-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ../auth
      dockerfile: Dockerfile
    container_name: taskhive-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskhive
      SPRING_DATASOURCE_USERNAME: taskhive
      SPRING_DATASOURCE_PASSWORD: taskhive
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production-256bit}
      CACHE_TYPE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: http://localhost
      OLLAMA_URL: http://ollama:11434
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: taskhive-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
