# 실제 배포 시 이 파일을 복사해 secret.yaml을 생성하고 base64 값을 채운 뒤
# kubectl apply -f k8s/secret.yaml 로 적용합니다.
# secret.yaml은 절대 커밋하지 마세요.
#
# base64 인코딩 예시:
#   echo -n "your-password" | base64
apiVersion: v1
kind: Secret
metadata:
  name: taskhive-secret
  namespace: taskhive
type: Opaque
data:
  db-password: dGFza2hpdmU=       # "taskhive" (로컬 개발용 — 운영에서 교체)
  jwt-secret: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=  # 운영에서 반드시 교체
