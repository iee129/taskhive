services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskhive
      POSTGRES_USER: taskhive
      POSTGRES_PASSWORD: taskhive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhive"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskhive
      SPRING_DATASOURCE_USERNAME: taskhive
      SPRING_DATASOURCE_PASSWORD: taskhive
      JWT_SECRET: local-dev-secret-replace-in-production-with-256bit-key
      CORS_ORIGINS: http://localhost
      SERVER_PORT: "8080"
      JAVA_OPTS: "-XX:+UseSerialGC -Xss512k -XX:MaxRAMPercentage=75"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
